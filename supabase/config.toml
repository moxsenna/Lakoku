project_id = "lakoku-v2"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
# Linked production is Postgres 17 (supabase link warning).
major_version = 17

[db.pooler]
enabled = false
port = 55329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = true

[studio]
enabled = true
port = 55323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 55324
smtp_port = 55325
pop3_port = 55326

[storage]
enabled = true
file_size_limit = "50MiB"

[analytics]
enabled = true
port = 55327
backend = "postgres"
